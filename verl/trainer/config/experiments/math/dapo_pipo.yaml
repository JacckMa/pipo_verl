# @package _global_

defaults:
  - /ppo_trainer
  - _self_

experiment:
  name: DAPO+PIPO
  tags: [dapo, math, pipo]
  description: "DAPO+PIPO training on MATH dataset"

reward_model:
  reward_manager: dapo
  reward_kwargs:
    max_resp_len: ${data.max_response_length}
    overlong_buffer_cfg:
      enable: False
      len: 4096
      penalty_factor: 1.0

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False

  filter_groups:
    enable: True
    metric: acc
    max_num_gen_batches: 10
  
  # PIPO Mechanism
  layback:
    enable: true
    history_window_size: 8
    min_steps_before_layback: 8
    progress_scale_min:  0         
    progress_scale_max:  0.5        

data:
  train_files: ./dataset/math/train.parquet
  val_files:
    - ./dataset/HuggingFaceH4_MATH-500/test.parquet
    - ./dataset/math-ai_amc23/test.parquet
    - ./dataset/math-ai_aime25/test.parquet
    - ./dataset/knoveleng_Minerva-Math/test.parquet
  train_batch_size: 128
  max_prompt_length: 512
  max_response_length: 4096
  filter_overlong_prompts: True
  truncation: 'error'
  shuffle: false

actor_rollout_ref:
  model:
    # TODO: change to your model path
    path: /your_model_dir/models/Qwen-4B
    use_shm: False
    use_remove_padding: True
    enable_gradient_checkpointing: True
  
  actor:
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 8
    use_kl_loss: True
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    fsdp_config:
      param_offload: True
      optimizer_offload: True
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28  # clip_high in DAPO
    clip_ratio_c: 10.0
    loss_agg_mode: token-mean
    checkpoint:
      save_contents: ['model']
  
  rollout:
    name: vllm
    log_prob_micro_batch_size_per_gpu: 8
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.6
    n: 8
    load_format: safetensors
    layered_summon: True
    top_p: 1.0
    val_kwargs:
      n: 1
      do_sample: true
      temperature: 0.7
      top_p: 1
  
  ref:
    log_prob_micro_batch_size_per_gpu: 8
    fsdp_config:
      param_offload: True

trainer:
  project_name: PIPO-MATH
  experiment_name: ${experiment.name}
  logger: ['console', 'wandb']
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 50
  test_freq: 10
  val_before_train: true
  total_epochs: 9
  critic_warmup: 0
  # TODO: change to your checkpoint dir
  default_local_dir: /your_checkpoint_dir/${trainer.project_name}/${trainer.experiment_name}

hydra:
  run:
    dir: logs/${now:%Y-%m-%d_%H%M%S}_${experiment.name}
  job:
    chdir: False

